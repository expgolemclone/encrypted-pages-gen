<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta content="noindex, nofollow" name="robots" />
    <title>Resume</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070806;
        --panel: #12140f;
        --ink: #fff0c4;
        --muted: #a99568;
        --line: rgba(241, 223, 181, 0.22);
        --amber: #d7a23a;
        --red: #f0543e;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          linear-gradient(90deg, rgba(241, 223, 181, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(241, 223, 181, 0.03) 1px, transparent 1px),
          #070806;
        background-size: 72px 72px;
        color: var(--ink);
      }

      main {
        width: min(100%, 420px);
        border: 1px solid var(--line);
        background: rgba(18, 20, 15, 0.96);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 18px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      input,
      button {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        font: inherit;
      }

      input {
        margin-top: 8px;
        padding: 10px 12px;
        background: #080906;
        color: var(--ink);
      }

      button {
        margin-top: 14px;
        cursor: pointer;
        background: var(--amber);
        color: #080906;
        font-weight: 700;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .status {
        min-height: 22px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .status.error {
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resume</h1>
      <form id="unlock">
        <label for="password">
          Password
          <input
            autocomplete="current-password"
            autofocus
            id="password"
            name="password"
            required
            type="password"
          />
        </label>
        <button id="submit" type="submit">Open</button>
        <p aria-live="polite" class="status" id="status"></p>
      </form>
    </main>
    <script>
      const form = document.getElementById("unlock");
      const passwordInput = document.getElementById("password");
      const submitButton = document.getElementById("submit");
      const status = document.getElementById("status");

      function decodeBase64(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes;
      }

      async function decryptPayload(payload, password) {
        const passwordKey = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(password),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: decodeBase64(payload.salt),
            iterations: payload.iterations,
            hash: "SHA-256",
          },
          passwordKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"],
        );
        const ciphertext = decodeBase64(payload.ciphertext);
        const tag = decodeBase64(payload.tag);
        const sealed = new Uint8Array(ciphertext.length + tag.length);
        sealed.set(ciphertext);
        sealed.set(tag, ciphertext.length);
        const plaintext = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: decodeBase64(payload.iv), tagLength: 128 },
          key,
          sealed,
        );
        return new TextDecoder().decode(plaintext);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = passwordInput.value.trim();
        status.classList.remove("error");
        status.textContent = "Opening...";
        submitButton.disabled = true;

        try {
          const response = await fetch("payload.json?v=e71f1daea7ddcc08", { cache: "no-store" });
          if (!response.ok) {
            throw new Error("payload.json could not be loaded.");
          }
          const payload = await response.json();
          const html = await decryptPayload(payload, password);
          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          status.classList.add("error");
          status.textContent = "Password is incorrect or the page is unavailable.";
          submitButton.disabled = false;
          passwordInput.select();
        }
      });
    </script>
  </body>
</html>
